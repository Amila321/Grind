spring.application.name=grind-backend

server.port=${PORT:8080}

spring.profiles.default=local

spring.jpa.open-in-view=false

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}

app.jwt.secret=${APP_JWT_SECRET:local-dev-secret-key-must-be-at-least-32-chars}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}